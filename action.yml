name: 'CodeCanary PR Review'
description: 'AI-powered PR review using Claude Code'
branding:
  icon: 'eye'
  color: 'yellow'

inputs:
  claude_code_oauth_token:
    description: 'Claude access token (from OAuth flow). Preferred over api_key.'
    required: false
  anthropic_api_key:
    description: 'Anthropic API key (alternative to access token)'
    required: false
  config_path:
    description: 'Path to .codecanary.yml'
    required: false
    default: '.codecanary.yml'
  post_comment:
    description: 'Post findings as PR comment'
    required: false
    default: 'true'
  codecanary_version:
    description: 'CodeCanary CLI version to install (e.g. "v0.1.0"). Defaults to latest release.'
    required: false
    default: 'latest'
  reply_only:
    description: 'Evaluate thread replies only, skip new findings'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Install CodeCanary
      shell: bash
      env:
        CODECANARY_VERSION: ${{ inputs.codecanary_version }}
      run: |
        set -euo pipefail
        REPO="alansikora/codecanary"
        if [ "$CODECANARY_VERSION" = "latest" ]; then
          TAG=$(gh api "repos/$REPO/releases/latest" --jq '.tag_name' 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            echo "::error::Could not determine latest CodeCanary release"
            exit 1
          fi
        else
          TAG="$CODECANARY_VERSION"
        fi
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
        esac
        VERSION="${TAG#v}"
        ARCHIVE="codecanary_${VERSION}_${OS}_${ARCH}.tar.gz"
        URL="https://github.com/$REPO/releases/download/$TAG/$ARCHIVE"
        echo "Installing CodeCanary $TAG ($OS/$ARCH)..."
        curl -fsSL "$URL" | tar -xz -C /usr/local/bin codecanary
        chmod +x /usr/local/bin/codecanary

    - name: Install Claude Code
      shell: bash
      run: |
        npm install -g @anthropic-ai/claude-code

    - name: Generate review token
      id: review-token
      shell: bash
      run: |
        # Request OIDC token from GitHub Actions (requires id-token: write permission).
        if [ -z "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
          echo "::error::OIDC not available. Add 'id-token: write' permission to your workflow and install the CodeCanary Review app."
          exit 1
        fi
        OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=codecanary" | jq -r '.value')
        if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
          echo "::error::Failed to obtain OIDC token."
          exit 1
        fi
        # Exchange OIDC token for a GitHub App installation token.
        RESPONSE=$(curl -sS -X POST https://oidc.codecanary.sh/token \
          -H "Authorization: Bearer $OIDC_TOKEN" \
          -H "Content-Type: application/json")
        TOKEN=$(echo "$RESPONSE" | jq -r '.token // empty')
        if [ -n "$TOKEN" ]; then
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
        else
          ERROR=$(echo "$RESPONSE" | jq -r '.error // "unknown error"')
          echo "::error::Failed to get CodeCanary Review app token: $ERROR. Install the app at https://github.com/apps/codecanary-review"
          exit 1
        fi

    - name: Run review
      shell: bash
      env:
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude_code_oauth_token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        GH_TOKEN: ${{ steps.review-token.outputs.token }}
      run: |
        PR_NUMBER="${{ github.event.pull_request.number }}"
        REPO="${{ github.repository }}"
        POST_FLAG=""
        if [ "${{ inputs.post_comment }}" = "true" ]; then
          POST_FLAG="--post"
        fi
        REPLY_ONLY_FLAG=""
        if [ "${{ inputs.reply_only }}" = "true" ]; then
          REPLY_ONLY_FLAG="--reply-only"
        fi
        codecanary review "$PR_NUMBER" \
          --repo "$REPO" \
          --config "${{ inputs.config_path }}" \
          $POST_FLAG \
          $REPLY_ONLY_FLAG
