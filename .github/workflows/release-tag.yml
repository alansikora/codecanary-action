name: Update release tags
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-tags:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Move v1 tag
        run: |
          git tag -f v1
          git push origin v1 --force

      - name: Create canary tag
        run: |
          # Patch install step to always pass --canary
          sed -i 's|ARGS=()|ARGS=(--canary)|' action.yml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add action.yml
          git commit -m "Patch action.yml for canary release"
          git tag -f canary
          git push origin canary --force
